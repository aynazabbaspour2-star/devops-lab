name: Docker Build CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Build Docker Image
        run: |
          docker build \
          -t devops-backend-test \
          ./projects/04-multi-container-app/backend


      - name: Validate Docker Compose
        run: |
          cd projects/04-multi-container-app
          docker compose config
