version: "3.8"

services:

  traefik:
    image: traefik:v3.6

    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"

    command:
      - --configFile=/etc/traefik/traefik.yml

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/dynamic:ro
      - ./ssl:/ssl:ro

    networks:
      - traefik-public

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.role == manager


networks:

  traefik-public:
    external: true
